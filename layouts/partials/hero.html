<section class="hero">
  <div class="hero-inner">
    <div class="avatar-wrap">
      <img src="/images/avatar.svg" alt="Avatar" class="avatar"/>
      <div class="avatar-lines">
        <span class="line"></span>
        <span class="line-text">Experimental Economics</span>
        <span class="line"></span>
      </div>
      <div class="avatar-lines">
        <span class="line"></span>
        <span class="line-text">Responsible Leadership</span>
        <span class="line"></span>
      </div>
    </div>
    <div class="hero-text">
      <h1 class="headline">Hi, I'm {{ .Site.Params.hero.name }} <span class="wave">👋</span></h1>
      <p class="tagline phd-line">{{ .Site.Params.hero.tagline }}</p>
      <p class="subline">{{ .Site.Params.hero.subline }}</p>
    </div>
  </div>
</section>
